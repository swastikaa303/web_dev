<!DOCTYPE html>

<head>

     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Note Taker</title>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            background: #f4f4f4;
        }
        textarea {
            width: 95%;
            height: 60vh;
            font-size: 18px;
            padding: 15px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #316357;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <h1>📝My Notes in class</h1>
    <textarea id="note" placeholder="Start typing your note..."></textarea>
    <br><br>        
    <button id="save">💾Save Note 🎬</button>
    <button id="save-as">💾Save As</button>
    <p id="save_status"></p>

    <script src="renderer.js"></script>
</body>

</html>
